# Build actions for every push
name: onpush

on:
  push:
    branches:
      - master
      - stable
  pull_request:

jobs:
  check:
    strategy:
      matrix:
        python-ver: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-ver }}
      - name: Install Hatch
        run: pip install --upgrade hatch
      - name: Lint
        run: hatch run lint:check
      - name: Get Autonity version
        run: echo "AUTONITY_VERSION=$(cat AUTONITY_VERSION)" >> "$GITHUB_ENV"
      - name: Get Autonity build
        run: >
          mkdir -p build &&
          curl -L https://github.com/autonity/autonity/releases/download/$AUTONITY_VERSION/autonity-linux-amd64-${AUTONITY_VERSION#v}.tar.gz |
            tar -xz -C build &&
          chmod +x build/autonity
      - name: Test
        run: hatch run +py=${{ matrix.python-ver }} test:ci
